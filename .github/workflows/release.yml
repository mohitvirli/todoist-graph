name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.2)'
        required: true

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build:renderer
      - run: npx electron-builder --mac dmg --arm64 --x64 --publish never
      - name: Release notes from CHANGELOG
        run: node scripts/write-release-notes.js > release-notes.md
      - uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.dmg
          body_path: release-notes.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build:renderer
      - run: npx electron-builder --win nsis --x64 --publish never
      - uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.exe
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
